services:
  - type: web
    name: lawyer-app
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    disk:
      name: db-storage
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: /data/justice_v2.db
      - key: VITE_GEMINI_API_KEY
        sync: false
