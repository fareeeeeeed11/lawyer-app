<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سيادةالمحامي محمد أحمد الكامل</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="apple-touch-icon" href="https://picsum.photos/id/1/192/192" />
    <script type="module" crossorigin src="/assets/index-BB5A2Q4T.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BbLBjeEl.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', (event) => {
        document.body.innerHTML += `<div style="position:fixed; top:0; left:0; right:0; background:red; color:white; padding:20px; z-index:99999; font-size:12px; font-family:monospace; white-space:pre-wrap;">
          <b>Error:</b> ${event.message}<br>
          <b>Location:</b> ${event.filename}:${event.lineno}:${event.colno}<br>
          <b>Stack:</b> ${event.error ? event.error.stack : 'N/A'}
        </div>`;
      });
      window.addEventListener('unhandledrejection', (event) => {
        document.body.innerHTML += `<div style="position:fixed; top:200px; left:0; right:0; background:orange; color:white; padding:20px; z-index:99999; font-size:12px; font-family:monospace; white-space:pre-wrap;">
          <b>Promise Rejection:</b> ${event.reason ? (event.reason.stack || event.reason.message || event.reason) : 'Unknown'}
        </div>`;
      });
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('SW registered:', reg);
          }).catch(err => {
            console.log('SW registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
